<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primordial Harvest</title>
    <link rel="icon" href="data:,">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;900&family=Nunito:wght@400;600;800&display=swap');

        :root {
            --paper-bg: #F4F1EA;
            --paper-texture: #EBE6DE;
            --ink-primary: #3E2723;
            --ink-secondary: #5D4037;
            --accent-warm: #D48C70;
            --accent-growth: #7C9473;
            --accent-water: #8DACCF;
            --card-bg: #FFFFFF;

            --radius-sketchy: 255px 15px 225px 15px / 15px 225px 15px 255px;
            --radius-soft: 24px;

            --font-display: 'Fraunces', serif;
            --font-body: 'Nunito', sans-serif;

            --shadow-float: 0 10px 30px -10px rgba(62, 39, 35, 0.15);
            --shadow-sketch: 4px 4px 0px rgba(62, 39, 35, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--paper-bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0,0,0,0.02) 1px, transparent 1px),
                radial-gradient(circle at 90% 80%, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: var(--font-body);
            color: var(--ink-primary);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        h1 {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            color: var(--ink-primary);
            text-transform: uppercase;
        }

        .currency-pill {
            background: var(--card-bg);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            border: 2px solid var(--ink-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 2px 2px 0 var(--ink-primary);
            font-weight: 800;
            font-size: 1.1rem;
        }

        .dna-icon {
            width: 20px;
            height: 20px;
            fill: var(--accent-warm);
        }

        main {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            gap: 2rem;
            padding: 0 3rem 3rem 3rem;
            height: 100%;
            overflow: hidden;
        }

        .panel {
            background: var(--card-bg);
            border-radius: var(--radius-soft);
            box-shadow: var(--shadow-float);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            position: relative;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: repeating-linear-gradient(
                45deg,
                var(--paper-bg),
                var(--paper-bg) 10px,
                var(--card-bg) 10px,
                var(--card-bg) 20px
            );
            border-radius: 20px 20px 0 0;
            opacity: 0.5;
        }

        .panel-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--ink-primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--ink-secondary);
        }

        .bar-container {
            width: 60%;
            height: 12px;
            background: var(--paper-bg);
            border-radius: 10px;
            border: 2px solid var(--ink-primary);
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: var(--ink-primary);
            border-right: 2px solid var(--ink-primary);
            border-radius: 4px;
        }

        .bar-fill.health { background: var(--accent-warm); }
        .bar-fill.speed { background: var(--accent-water); }
        .bar-fill.photo { background: var(--accent-growth); }

        .sketch-box {
            border: 2px dashed var(--ink-primary);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            background: var(--paper-bg);
        }

        .sketch-box h3 {
            font-family: var(--font-display);
            margin-bottom: 0.5rem;
        }

        .sketch-box p {
            font-size: 0.9rem;
            line-height: 1.4;
            opacity: 0.8;
        }

        .petri-dish {
            background: #E8F1F5;
            border: 3px solid var(--ink-primary);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.05);
            cursor: crosshair;
        }

        .bg-doodle {
            position: absolute;
            opacity: 0.1;
            pointer-events: none;
            animation: drift 20s infinite linear;
        }

        .creature-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: var(--accent-growth);
            border: 3px solid var(--ink-primary);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 8px 8px 0 rgba(62, 39, 35, 0.2);
            animation: breathe 4s ease-in-out infinite, wiggle 6s ease-in-out infinite;
            z-index: 5;
            transition: all 0.3s ease;
        }

        .creature-face {
            display: flex;
            gap: 12px;
            margin-top: -10px;
        }

        .eye {
            width: 14px;
            height: 14px;
            background: var(--ink-primary);
            border-radius: 50%;
            position: relative;
        }

        .eye::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
        }

        .creature-mouth {
            position: absolute;
            bottom: 35px;
            width: 16px;
            height: 8px;
            border-bottom: 3px solid var(--ink-primary);
            border-radius: 50%;
        }

        .particle {
            position: absolute;
            border: 2px solid var(--ink-primary);
            background: white;
            animation: float-around 10s infinite ease-in-out alternate;
        }

        .particle.food {
            width: 15px;
            height: 15px;
            background: var(--accent-warm);
            border-radius: 50%;
        }

        .particle.bubble {
            width: 10px;
            height: 10px;
            background: transparent;
            border-radius: 50%;
            opacity: 0.5;
        }

        .parts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .part-card {
            background: var(--paper-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .part-card:hover {
            border-color: var(--ink-primary);
            transform: translateY(-2px);
            background: white;
            box-shadow: var(--shadow-sketch);
        }

        .part-icon {
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .part-icon svg {
            width: 100%;
            height: 100%;
            stroke: var(--ink-primary);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .part-name {
            font-weight: 700;
            font-size: 0.85rem;
            text-align: center;
        }

        .part-cost {
            font-size: 0.75rem;
            background: var(--ink-primary);
            color: var(--paper-bg);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .evolve-btn {
            margin-top: auto;
            background: var(--ink-primary);
            color: var(--paper-bg);
            font-family: var(--font-display);
            font-size: 1.25rem;
            border: none;
            padding: 1.25rem;
            border-radius: var(--radius-sketchy);
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
        }

        .evolve-btn:active {
            transform: scale(0.98) translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        @keyframes wiggle {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            33% { border-radius: 50% 50% 40% 60% / 50% 40% 60% 50%; }
            66% { border-radius: 40% 60% 70% 30% / 40% 60% 30% 70%; }
        }

        @keyframes drift {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-500px) rotate(360deg); }
        }

        @keyframes float-around {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, -30px); }
        }

        .doodle-border-bottom {
            border-bottom: 2px dashed var(--ink-primary);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand-container">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <path d="M20 5C12 5 5 12 5 20C5 28 12 35 20 35C28 35 35 28 35 20" stroke="#3E2723" stroke-width="3" stroke-linecap="round"></path>
                <path d="M35 20C35 15 30 15 28 20" stroke="#7C9473" stroke-width="3" stroke-linecap="round"></path>
                <circle cx="20" cy="20" r="4" fill="#3E2723"></circle>
            </svg>
            <h1>Primordial Harvest</h1>
        </div>

        <div class="currency-pill">
            <svg class="dna-icon" viewBox="0 0 24 24">
                <path d="M12 2C13.5 4 16 6 16 9C16 11 13 13 12 15C11 13 8 11 8 9C8 6 10.5 4 12 2Z" fill="#D48C70"></path>
                <path d="M12 22C10.5 20 8 18 8 15C8 13 11 11 12 9C13 11 16 13 16 15C16 18 13.5 20 12 22Z" fill="#7C9473"></path>
            </svg>
            <span>850 DNA</span>
        </div>
    </header>

    <main>
        <aside class="panel">
            <div class="panel-title">
                <svg width="24" height="24" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
                Vitals
            </div>

            <div class="sketch-box">
                <h3>Specimen #42</h3>
                <p>A gentle herbivore thriving in the shallow tide. Likes sunlight and algae.</p>
            </div>

            <div class="doodle-border-bottom"></div>

            <div class="stat-group">
                <div class="stat-row">
                    <span>Structure</span>
                    <span>120 / 200</span>
                </div>
                <div class="bar-container">
                    <div class="bar-fill health" style="width: 60%"></div>
                </div>
            </div>

            <div class="stat-group">
                <div class="stat-row">
                    <span>Motility</span>
                    <span>45 km/y</span>
                </div>
                <div class="bar-container">
                    <div class="bar-fill speed" style="width: 35%"></div>
                </div>
            </div>

            <div class="stat-group">
                <div class="stat-row">
                    <span>Photosynthesis</span>
                    <span>Grade A</span>
                </div>
                <div class="bar-container">
                    <div class="bar-fill photo" style="width: 85%"></div>
                </div>
            </div>
        </aside>

        <section class="petri-dish">
            <svg class="bg-doodle" style="top: 10%; left: 10%;" width="100" height="100" viewBox="0 0 100 100">
                <path d="M10 50 Q 25 25 50 50 T 90 50" stroke="#8DACCF" stroke-width="2" fill="none"></path>
            </svg>
            <svg class="bg-doodle" style="bottom: 20%; right: 15%; animation-delay: 2s;" width="80" height="80" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" stroke="#8DACCF" stroke-width="2" fill="none" stroke-dasharray="5,5"></circle>
            </svg>

            <div class="particle food" style="top: 20%; left: 30%;"></div>
            <div class="particle food" style="top: 70%; left: 80%; animation-duration: 12s;"></div>
            <div class="particle food" style="top: 15%; left: 85%; animation-duration: 8s;"></div>
            <div class="particle bubble" style="top: 40%; left: 20%; width: 20px; height: 20px;"></div>

            <div class="creature-stage">
                <div class="creature-face">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="creature-mouth"></div>
            </div>

            <div style="position: absolute; bottom: 20px; left: 20px; background: rgba(255,255,255,0.8); padding: 5px 15px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; color: var(--ink-secondary);">
                Depth: 0.4mm
            </div>
        </section>

        <aside class="panel">
            <div class="panel-title">
                <svg width="24" height="24" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                Adaptations
            </div>

            <div class="parts-grid">
                <div class="part-card">
                    <div class="part-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C8 2 8 8 8 8s-4 0-4 4 4 4 4 4 0 6 4 6 4-6 4-6 4 0 4-4-4-4-4-4 0-6-4-6z"></path>
                        </svg>
                    </div>
                    <span class="part-name">Simple Cilia</span>
                    <span class="part-cost">50 DNA</span>
                </div>

                <div class="part-card">
                    <div class="part-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M2 12s4-4 10-4 10 4 10 4-4 4-10 4-10-4-10-4z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                    <span class="part-name">Stalk Eye</span>
                    <span class="part-cost">120 DNA</span>
                </div>

                <div class="part-card">
                    <div class="part-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M18 8c0-3.3-2.7-6-6-6S6 4.7 6 8c0 2 .8 3.8 2 5l-2 7h12l-2-7c1.2-1.2 2-3 2-5z"></path>
                            <path d="M12 13v8"></path>
                        </svg>
                    </div>
                    <span class="part-name">Chloroplast</span>
                    <span class="part-cost">200 DNA</span>
                </div>

                <div class="part-card">
                    <div class="part-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                    </div>
                    <span class="part-name">Membrane</span>
                    <span class="part-cost">80 DNA</span>
                </div>
            </div>

            <button class="evolve-btn">
                Grow Organism!
            </button>
        </aside>
    </main>
</body>
</html>
